{% extends "base.html" %}
{% block title %}Apply for Room - Roomiio{% endblock %}
{% block content %}
<div class="container">
    <h1>Apply for {{ room_type.replace('-', ' ').title() }}</h1>
    <p>Please fill out the details below to apply for accommodation.</p>
    
    <form method="POST">
        <div class="form-group">
            <label>Full Name:</label>
            <input type="text" value="{{ current_user.name }}" readonly style="background-color: #f0f0f0;">
        </div>
        <div class="form-group">
            <label>Email:</label>
            <input type="text" value="{{ current_user.email }}" readonly style="background-color: #f0f0f0;">
        </div>
        <div class="form-group">
            <label>Room Type Applied For:</label>
            <input type="text" value="{{ room_type.replace('-', ' ').title() }}" readonly style="background-color: #f0f0f0;">
        </div>
        
        <button type="submit" class="btn-primary">Submit Application</button>
        <a href="/available_rooms" style="margin-left: 10px;">Cancel</a>
    </form>
</div>
{% endblock %}
